name: Check for new TJ stores

on:
  # Daily at 14:00 UTC (06:00 California time, after TJ's midnight site updates)
  schedule:
    - cron: '0 14 * * *'
  # Also runnable manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run store watcher
        id: watcher
        run: node scripts/check-new-stores.mjs

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet src/data/tj-stores.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with new stores
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Auto-update: refresh TJ store list from locations.traderjoes.com"
          title: "🆕 New Trader Joe's stores detected"
          body-path: STORE_UPDATE_SUMMARY.md
          branch: auto/store-list-refresh
          delete-branch: true
          add-paths: |
            src/data/tj-stores.json

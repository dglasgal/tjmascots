name: Supabase keep-alive

# Hit the Supabase REST API on a schedule so the free-tier project never
# goes idle long enough to be paused / deprioritized. One tiny GET every
# 6 hours is plenty; no data is changed and no email is sent.

on:
  schedule:
    # Every 6 hours, offset so it doesn't collide with the nightly digest at 14:00 UTC.
    - cron: '15 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: https://xxdandghgljvjbirlhfz.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          # A cheap SELECT LIMIT 1 against the public mascots table is enough
          # to count as activity. Use --fail-with-body so we see the error.
          curl --silent --show-error --fail-with-body \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/mascots?select=id&limit=1" \
            > /dev/null
          echo "Keep-alive ping sent OK at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
